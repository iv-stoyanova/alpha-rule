name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .[dev]
      # The rl/OpenTheChests tests skip themselves when OTC is not installed,
      # so the suite stays green on a plain CI runner.
      - run: pytest alpha_rule/tests -q
